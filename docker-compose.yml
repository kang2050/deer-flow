services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    expose:
      - "2026"
    depends_on:
      - frontend
      - gateway
      - langgraph
    networks:
      - coolify
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-deerflow-kang-2026-secret}
    networks:
      - coolify
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - deer-flow-data:/app/backend/.deer-flow
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - POE_API_KEY=${POE_API_KEY}
    networks:
      - coolify
    restart: unless-stopped

  langgraph:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - deer-flow-data:/app/backend/.deer-flow
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - LANGCHAIN_TRACING_V2=false
      - POE_API_KEY=${POE_API_KEY}
    networks:
      - coolify
    restart: unless-stopped

volumes:
  deer-flow-data:

networks:
  coolify:
    external: true
