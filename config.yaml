config_version: 3
log_level: info

token_usage:
  enabled: false

models:
  - name: deepseek-r1
    display_name: DeepSeek R1 (Poe)
    use: langchain_openai:ChatOpenAI
    model: DeepSeek-R1
    api_key: $POE_API_KEY
    base_url: https://api.poe.com/v1
    max_tokens: 4096
    supports_vision: false

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

tool_search:
  enabled: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

skills:
  container_path: /mnt/skills

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564

memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

checkpointer:
  type: sqlite
  connection_string: checkpoints.db